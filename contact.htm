<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Contact | ShotbySpirit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="logo">ShotbySpirit</div>
            <nav class="nav-bar">
                <ul>
                    <li><a href="index.htm">Home</a></li>
                    <li><a href="galleries.htm">Galleries</a></li>
                    <li><a href="about.htm">About</a></li>
                    <li><a href="contact.htm" aria-current="page">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Contact Us</h1>
            <p class="hero-subtitle">Get in touch with ShotbySpirit</p>
        </div>
    </section>

    <main class="container">
        <section class="contact-section">
            <div class="contact-container">
                <h2>Send us a Message</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject *</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>

                <div class="contact-info">
                    <div class="info-item">
                        <h3>Email</h3>
                        <p>shotbyspirit@proton.me</p>
                    </div>
                    <div class="info-item">
                        <h3>Follow Us</h3>
                        <p>Instagram</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-col">
                <h4>About the Page</h4>
                <p>Capturing nature's beauty for our Instagram community.</p>
            </div>
            <div class="footer-col">
                <h4>Contact</h4>
                <p>Email: shotbyspirit@proton.me</p>
            </div>
        </div>
    </footer>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("sw.js");
            });
        }
    </script>

</body>
</html>
